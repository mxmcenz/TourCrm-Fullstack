workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "stage"'
    - when: never

stages: [test, debug, deploy]

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  ASPNETCORE_ENVIRONMENT: "Testing"
  DB_RESET: "true"
  DB_BACKUP: "false"

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "stage"'
  script:
    - dotnet restore ./backend/TourCrm/TourCrm.sln
    - dotnet test ./backend/TourCrm/TourCrm.IntegrationTests/TourCrm.IntegrationTests.csproj -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
    - dotnet tool install -g trx2junit
    - ~/.dotnet/tools/trx2junit TestResults/*.trx
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - TestResults/
    reports:
      junit: TestResults/*.xml

debug_remote:
  stage: debug
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "stage"'
      when: manual
  before_script:
    - apk add --no-cache openssh-client bash coreutils netcat-openbsd curl
    - '[ -n "$SSH_HOST" ] || { echo "CI var SSH_HOST is empty"; exit 1; }'
    - '[ -n "$SSH_USER" ] || { echo "CI var SSH_USER is empty"; exit 1; }'
    - '[ -n "$SSH_PRIVATE_KEY_B64" ] || { echo "CI var SSH_PRIVATE_KEY_B64 is empty"; exit 1; }'
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > id_debug && chmod 600 id_debug
    - nc -vz -w 3 "$SSH_HOST" 22
    - ssh -i id_debug -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" 'echo ok'
  script:
    - REMOTE_PATH="${SSH_PATH:-/opt/ac14-team3}"
    - >
      ssh -i id_debug -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST"
      'bash -lc "
        set -euo pipefail
        cd '"$REMOTE_PATH"' || exit 1
        docker compose ps || true
        docker compose logs backend --tail=200 || true
        docker compose logs nginx --tail=200 || true
        nginx -t || true
        systemctl status nginx --no-pager || true
        journalctl -u nginx -n 100 --no-pager || true
        systemctl status ssh --no-pager || systemctl status sshd --no-pager || true
        journalctl -u ssh -n 50 --no-pager || journalctl -u sshd -n 50 --no-pager || true
        ufw status || true
        curl -sS -D- http://localhost/api/healthz || true
      "'

deploy_stage:
  stage: deploy
  image: alpine:3.20
  needs: ["test"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "stage"'
  before_script:
    - apk add --no-cache openssh-client bash git coreutils netcat-openbsd curl
    - '[ -n "$SSH_HOST" ] || { echo "CI var SSH_HOST is empty"; exit 1; }'
    - '[ -n "$SSH_USER" ] || { echo "CI var SSH_USER is empty"; exit 1; }'
    - '[ -n "$SSH_PRIVATE_KEY_B64" ] || { echo "CI var SSH_PRIVATE_KEY_B64 is empty"; exit 1; }'
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > id_deploy && chmod 600 id_deploy
    - nc -vz -w 3 "$SSH_HOST" 22
    - ssh -i id_deploy -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" 'echo ok'
  script:
    - REMOTE_PATH="${SSH_PATH:-/opt/ac14-team3}"
    - >
      ssh -i id_deploy -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST"
      DB_RESET="${DB_RESET:-false}" DB_BACKUP="${DB_BACKUP:-true}"
      'bash -lc "
        set -euo pipefail
        cd '"$REMOTE_PATH"' || exit 1
        test -f .env || { echo ERROR: .env missing; exit 1; }

        git fetch --prune origin
        git checkout stage
        git reset --hard origin/stage

        docker compose down --remove-orphans

        docker compose up -d db
        sleep 2
        PGUSER=\$(docker compose exec -T db printenv POSTGRES_USER)
        PGDB=\$(docker compose exec -T db printenv POSTGRES_DB)
        PGPASSWORD=\$(docker compose exec -T db printenv POSTGRES_PASSWORD)
        export PGPASSWORD
        until docker compose exec -T db pg_isready -U \"\$PGUSER\" -d postgres >/dev/null 2>&1; do sleep 2; done

        if [ \"${DB_RESET}\" = \"true\" ]; then
          docker compose stop backend || true
          if [ \"${DB_BACKUP}\" = \"true\" ]; then
            TS=\$(date +%Y%m%d-%H%M%S)
            mkdir -p db_backups
            docker compose exec -T db pg_dump -U \"\$PGUSER\" -d \"\$PGDB\" -Fc > \"db_backups/\${TS}.dump\"
          fi
          docker compose exec -T db psql -U \"\$PGUSER\" -d postgres -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='\$PGDB';\"
          docker compose exec -T db psql -U \"\$PGUSER\" -d postgres -c \"DROP DATABASE IF EXISTS \\\"\$PGDB\\\" WITH (FORCE);\"
          docker compose exec -T db psql -U \"\$PGUSER\" -d postgres -c \"CREATE DATABASE \\\"\$PGDB\\\";\"
        fi

        docker compose up -d --build
        docker compose ps
        curl -sS -D- http://localhost/api/healthz || true
      "'
  environment:
    name: stage
    url: http://$SSH_HOST/
